<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Zuijiao</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="career-childPage career-childPage--zuijiao">
    <main class="career-child career-child--zuijiao" aria-label="Career Zuijiao page">
      <a
        class="zuijiao__back"
        href="./index.html?returnTo=career-overview#career-overview"
        aria-label="Back to career overview"
      >
        <svg class="zuijiao__backIcon" viewBox="0 0 24 24" role="presentation">
          <path d="M1 6.5C5.2 8.8 8.2 10.3 12 10.3C15.8 10.3 18.8 8.8 23 6.5C20.4 10.6 17.4 15.7 12 23C6.6 15.7 3.6 10.6 1 6.5Z" />
        </svg>
      </a>

      <section class="zuijiao">
        <div class="zuijiao__story">
          <h1 class="zuijiao__title">
            <span class="zuijiao__titleText">嘴角</span>
          </h1>

          <div class="zuijiao__copy">
            <p class="zuijiao__copyBlock" style="--copy-delay-base: 180ms">
              <span class="zuijiao__copyLine" style="--line-index: 0"
                >2015年，共享经济初萌芽</span
              >
              <span class="zuijiao__copyLine" style="--line-index: 1"
                >Uber 和 Airbnb 刚进入中国</span
              >
              <span
                class="zuijiao__copyLine zuijiao__prompt"
                style="--line-index: 2"
                >而我们想尝试的是：</span
              >
              <span
                class="zuijiao__copyLine zuijiao__statement"
                style="--line-index: 3"
                >“用一张家庭饭桌，连接陌生人”</span
              >
            </p>

            <p class="zuijiao__copyBlock" style="--copy-delay-base: 520ms">
              <span class="zuijiao__copyLine" style="--line-index: 0"
                >没有先例，没有标准</span
              >
              <span class="zuijiao__copyLine" style="--line-index: 1"
                >我和 Leader 两人</span
              >
              <span class="zuijiao__copyLine" style="--line-index: 2"
                >成了第一批探索者</span
              >
            </p>

            <p class="zuijiao__copyBlock" style="--copy-delay-base: 920ms">
              <span class="zuijiao__copyLine" style="--line-index: 0"
                >一手推开家门，挖掘料理人</span
              >
              <span class="zuijiao__copyLine" style="--line-index: 1"
                >一手消融陌生，聚集新食客</span
              >
              <span class="zuijiao__copyLine" style="--line-index: 2"
                >磨体验、建机制、创品牌、做社区</span
              >
            </p>

            <p class="zuijiao__copyBlock" style="--copy-delay-base: 1320ms">
              <span class="zuijiao__copyLine" style="--line-index: 0"
                >硬生生把一个抽象的概念</span
              >
              <span class="zuijiao__copyLine" style="--line-index: 1"
                >变成近千场真实的线下体验</span
              >
            </p>
          </div>
        </div>

        <div class="zuijiao__gallery" aria-label="Zuijiao image columns">
          <div class="zuijiao__column">
            <div class="zuijiao__rail zuijiao__rail--chefs">
              <div class="zuijiao__track">
                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_0445.JPG" alt="料理人现场照片" /></figure>

                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_4624.png" alt="料理人现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_4631.png" alt="料理人现场照片" /></figure>

                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_4636.png" alt="料理人现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_4642.png" alt="料理人现场照片" /></figure>
              </div>
              <div class="zuijiao__track" aria-hidden="true">
                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_0445.JPG" alt="" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_0774.JPG" alt="" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_4573.png" alt="" /></figure>

                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_4636.png" alt="" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-chefs/IMG_4642.png" alt="" /></figure>
              </div>
            </div>
          </div>

          <div class="zuijiao__column">
            <div class="zuijiao__rail zuijiao__rail--diners">
              <div class="zuijiao__track">
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_0443.png" alt="食客现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_0467.png" alt="食客现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4570.png" alt="食客现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4574.png" alt="食客现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4577.png" alt="食客现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4580.png" alt="食客现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4586.png" alt="食客现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4594.png" alt="食客现场照片" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4628.png" alt="食客现场照片" /></figure>

                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4570.png" alt="" /></figure>

                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4586.png" alt="" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4594.png" alt="" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/IMG_4628.png" alt="" /></figure>
                <figure class="zuijiao__card"><img src="./assets/zuijiao-diners/getimgdata-3.jpg" alt="" /></figure>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./career-zuijiao.js"></script>

</html>
