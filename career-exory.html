<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <meta name="theme-color" content="#ffffff" />
    <title>Career Exory</title>
    <link rel="preconnect" href="https://db.onlinewebfonts.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://db.onlinewebfonts.com/c/6e47ef470dd19698c911332a9b4d1cf4?family=Neue+Haas+Grotesk+Text+Pro"
    />
    <link
      rel="stylesheet"
      href="https://db.onlinewebfonts.com/c/dec0d9b4e22ca588dc20e1e2e09a59b5?family=Neue+Haas+Grotesk+Display+Pro+55+Roman"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="career-childPage career-childPage--exory">
    <main class="career-child career-child--exory" aria-label="Career Exory page">
      <a
        class="exoryBack"
        href="./index.html?returnTo=career-overview#career-overview"
        aria-label="Back to career overview"
      >
        <svg class="exoryBack__icon" viewBox="0 0 24 24" role="presentation">
          <path d="M1 6.5C5.2 8.8 8.2 10.3 12 10.3C15.8 10.3 18.8 8.8 23 6.5C20.4 10.6 17.4 15.7 12 23C6.6 15.7 3.6 10.6 1 6.5Z" />
        </svg>
      </a>

      <!-- Merge-ready homepage section: intro motion plus P2-P5 long-flow content. -->
      <section class="exoryIntro" data-exory-intro aria-labelledby="exory-intro-title">
        <div class="exoryIntro__pin">
          <div class="exoryIntro__copy">
            <p>后来，我想试试比更大的赛道</p>
            <p>有天老板说 “这个品牌的丝袜不错，我们也搞点货卖卖看，你想想怎么弄”</p>
            <p>于是我开启了</p>
          </div>

          <div class="exoryIntro__focus">
            <h1
              class="exoryIntro__statement"
              id="exory-intro-title"
              data-exory-statement
            >
              一场关于丝线的时尚实验
            </h1>

            <figure class="exoryIntro__logo" data-exory-logo>
              <img src="./assets/exory/logo-exory.png" alt="Exory logo" />
            </figure>
          </div>

          <div class="exoryIntro__stage" aria-hidden="true">
            <figure class="exoryIntro__card" data-exory-card>
              <img src="./assets/exory/selene.jpg" alt="" />
            </figure>
            <figure class="exoryIntro__card" data-exory-card>
              <img src="./assets/exory/aria.jpg" alt="" />
            </figure>
            <figure class="exoryIntro__card" data-exory-card>
              <img src="./assets/exory/corrine.jpg" alt="" />
            </figure>
            <figure class="exoryIntro__card" data-exory-card>
              <img src="./assets/exory/adara.jpg" alt="" />
            </figure>
            <figure class="exoryIntro__card" data-exory-card>
              <img src="./assets/exory/canna.jpg" alt="" />
            </figure>
            <figure class="exoryIntro__card" data-exory-card>
              <img src="./assets/exory/danica.jpg" alt="" />
            </figure>
            <figure class="exoryIntro__card" data-exory-card>
              <img src="./assets/exory/iris.jpg" alt="" />
            </figure>
            <figure class="exoryIntro__card" data-exory-card>
              <img src="./assets/exory/lilin.jpg" alt="" />
            </figure>
          </div>
        </div>
      </section>

      <section class="exoryLong exorySensual" data-exory-sensual aria-labelledby="exory-sensual-title">
        <div class="exoryLong__inner exorySensual__inner">
          <div class="exorySensual__logoSpace" aria-hidden="true"></div>

          <div class="exorySensual__copy" id="exory-sensual-title">
            <p>
              <span data-exory-fill>我们选择「性感」作为开篇灵感</span>
              <span data-exory-fill>首季均为极透的、无图案修饰的丝袜产品</span>
              <span data-exory-fill>直面世俗对丝袜的灰色印象</span>
            </p>
            <p>
              <span data-exory-fill>性感，不止于性，不等同于裸露</span>
              <span data-exory-fill>性感，应是纯粹的，多元的，平等的</span>
            </p>
            <p>
              <span data-exory-fill>不假修饰，亦无需掩饰</span>
              <span data-exory-fill>我们，生来性感</span>
            </p>
            <figure class="exorySensual__products">
              <img src="./assets/exory/exory-02-sensual-products.png" alt="Exory first season products" />
            </figure>
          </div>

          <figure class="exorySensual__media" data-exory-sensual-rotator aria-label="Exory sensual campaign visuals">
            <img
              class="is-active"
              data-exory-sensual-image
              src="./assets/exory/exory-02-sensual-main.jpg"
              alt="Exory sensual campaign visual"
            />
            <img
              data-exory-sensual-image
              src="./assets/exory/exory-02-sensual-rotate-02.jpg"
              alt="Exory sensual campaign visual"
            />
            <img
              data-exory-sensual-image
              src="./assets/exory/exory-02-sensual-rotate-03.jpg"
              alt="Exory sensual campaign visual"
            />
          </figure>
        </div>
      </section>

      <section class="exoryLong exoryRebuild" aria-labelledby="exory-rebuild-title">
        <div class="exoryLong__inner exoryRebuild__grid">
          <h2 class="exoryRebuild__title" id="exory-rebuild-title">重构产品</h2>
          <figure class="exoryRebuild__thread">
            <img src="./assets/exory/exory-03-rebuild-thread.png" alt="Exory thread comparison" />
          </figure>
          <p class="exoryRebuild__label exoryRebuild__label--weave">颠覆织造</p>
          <figure class="exoryRebuild__seamless">
            <img src="./assets/exory/exory-03-rebuild-seamless.png" alt="Seamless stockings detail" />
          </figure>
          <p class="exoryRebuild__label exoryRebuild__label--seamless">无缝裸感</p>
          <figure class="exoryRebuild__hero">
            <img src="./assets/exory/exory-03-rebuild-hero.jpg" alt="Exory reclining campaign visual" />
          </figure>
          <p class="exoryRebuild__label exoryRebuild__label--aesthetic">无痕美学</p>
        </div>
      </section>

      <section class="exoryLong exoryExperience" aria-labelledby="exory-experience-title">
        <div class="exoryLong__inner exoryExperience__grid">
          <div class="exoryExperience__left">
            <h2 class="exoryExperience__title" id="exory-experience-title">重构体验</h2>
            <p class="exoryExperience__headline">包装 ｜ 从开启，便不同</p>
            <video
              class="exoryExperience__video"
              src="./assets/exory/exory-04-package-hand.mp4"
              autoplay
              muted
              loop
              playsinline
              aria-label="Exory package opening video"
            ></video>
            <p class="exoryExperience__headline exoryExperience__headline--shopping">
              选购 ｜ 告别复杂参数，只由“风格”定义
            </p>
          </div>

          <figure class="exoryExperience__socks">
            <img src="./assets/exory/exory-04-package-socks.jpg" alt="Exory package and socks" />
          </figure>
        </div>
      </section>

      <section class="exoryLong exoryCharacters" data-exory-characters aria-labelledby="exory-characters-title">
        <div class="exoryLong__inner exoryCharacters__grid">
          <div class="exoryCharacters__names" id="exory-characters-title">
            <button type="button" class="exoryCharacters__name is-active" data-character="canna">CANNA</button>
            <button type="button" class="exoryCharacters__name" data-character="selene">SELENE</button>
            <button type="button" class="exoryCharacters__name" data-character="corrine">CORRINE</button>
            <button type="button" class="exoryCharacters__name" data-character="adara">ADARA</button>
            <button type="button" class="exoryCharacters__name" data-character="danica">DANICA</button>
            <button type="button" class="exoryCharacters__name" data-character="lilin">LILIN</button>
            <button type="button" class="exoryCharacters__name" data-character="iris">IRIS</button>
            <button type="button" class="exoryCharacters__name" data-character="aria">ARIA</button>
          </div>

          <div class="exoryCharacters__stage" aria-live="polite">
            <figure class="exoryCharacters__image is-active" data-character-image="canna">
              <img src="./assets/exory/exory-05-character-canna.jpg" alt="CANNA campaign visual" />
            </figure>
            <figure class="exoryCharacters__image" data-character-image="selene">
              <img src="./assets/exory/exory-05-character-selene.jpg" alt="SELENE campaign visual" />
            </figure>
            <figure class="exoryCharacters__image" data-character-image="corrine">
              <img src="./assets/exory/exory-05-character-corrine.jpg" alt="CORRINE campaign visual" />
            </figure>
            <figure class="exoryCharacters__image" data-character-image="adara">
              <img src="./assets/exory/exory-05-character-adara.jpg" alt="ADARA campaign visual" />
            </figure>
            <figure class="exoryCharacters__image" data-character-image="danica">
              <img src="./assets/exory/exory-05-character-danica.jpg" alt="DANICA campaign visual" />
            </figure>
            <figure class="exoryCharacters__image" data-character-image="lilin">
              <img src="./assets/exory/exory-05-character-lilin.jpg" alt="LILIN campaign visual" />
            </figure>
            <figure class="exoryCharacters__image" data-character-image="iris">
              <img src="./assets/exory/exory-05-character-iris.jpg" alt="IRIS campaign visual" />
            </figure>
            <figure class="exoryCharacters__image" data-character-image="aria">
              <img src="./assets/exory/exory-05-character-aria.jpg" alt="ARIA campaign visual" />
            </figure>
          </div>
        </div>
      </section>
    </main>

    <script src="./career-exory.js"></script>
  </body>
</html>
